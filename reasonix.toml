# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/AppData/Roaming/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
max_steps         = 0   # executor tool-call rounds; 0 = no limit
planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature       = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# reasoning_language = "zh"   # visible reasoning language: auto|zh|en
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
cold_resume_prune   = true   # elide stale tool results when reopening a session past the provider cache window
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix

[builtin_mcp]
time_enabled = true   # built-in Time MCP; off until manually enabled
context7_enabled = false   # built-in Context7 MCP; off until manually enabled

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "ask"
# deny = ["Bash(rm -rf*)", "Bash(git push*)"]   # hard-blocked in every mode
allow = ["Bash(git add -A && git status)", "Bash(git commit:*)", "Bash(cd /e/workspacedemo/shoot && git rm -r --cached .reasonix/ 2>/dev/null; git add -A && git commit --amend -m \"僵尸幸存者改造：主菜单+选关地图+左右射击+撕咬机制\" && git push --force)", "Bash(cd /e/workspacedemo/shoot && git add README.md && git commit -m \"添加 README.md 项目文档\" && git push)", "Bash(cd /e/workspacedemo/shoot && git push)", "Bash(cd /e/workspacedemo/shoot && git push --retry 3)", "Bash(ls -la assets/imgs/ 2>/dev/null || echo \"目录不存在\")", "Edit", "Bash(rm /e/workspacedemo/shoot/assets/imgs/map.png.import:*)", "Bash(python -c \"from PIL import Image; img=Image.open('/e/workspacedemo/shoot/assets/imgs/map.png'); print(img.size)\" 2>/dev/null || identify /e/workspacedemo/shoot/assets/imgs/map.png 2>/dev/null || echo \"no tool available\")", "Bash(cd /e/workspacedemo/shoot && git add -A && git commit -m \"地图滚动：MapContainer 跟随玩家移动，限制地图边缘\" && git push 2>&1 | head -20)", "Bash(cd /e/workspacedemo/shoot && git add -A && git status)", "Bash(cd /e/workspacedemo/shoot && git add -A && git commit -m \"背包系统：拾取/装备双按钮 + 背包面板UI\" && git push)", "Bash(cd /e/workspaceai/shoot && git stash list)", "Bash(cd /e/workspaceai/shoot && git stash show -p --stat 2>/dev/null | head -60)", "Bash(cd /e/workspaceai/shoot && echo \"=== 当前项目结构 ===\" && ls -la && echo \"\" && echo \"=== docs 目录 ===\" && ls -la docs/ 2>/dev/null || echo \"docs 目录不存在\" && echo \"\" && echo \"=== 游戏入口 ===\" && grep 'run/main_scene' project.godot)", "Bash(cd /e/workspaceai/shoot && git stash drop)", "Bash(echo \"=== 升级目录(中文) ===\" && grep 'append' scripts/upgrades/upgrade_catalog.gd | head -3 && echo \"\" && echo \"=== HUD文本(中文) ===\" && grep -n 'text.*=.*\"' scenes/hud.tscn | head -10 && echo \"\" && echo \"=== 金币系统 ===\" && grep -n 'gold\\|金币' scripts/game_manager.gd | head -5 && echo \"僵尸掉金币:\" && grep -n 'add_gold' scripts/enemy.gd && echo \"\" && echo \"=== 背包格子总数 ===\" && grep 'TOTAL_SLOTS' scripts/ui/backpack_panel.gd && echo \"\" && echo \"=== 默认解锁格数 ===\" && grep 'DEFAULT_UNLOCKED_SLOTS' scripts/game_manager.gd && echo \"\" && echo \"=== 解锁花费 ===\" && grep 'UNLOCK_COST' scripts/game_manager.gd && echo \"\" && echo \"=== 无需的文件(旧行式背包) ===\" && ls scenes/backpack_item_row.tscn scripts/ui/backpack_item_row.gd 2>/dev/null)", "Bash(echo \"=== 最终验证 ===\"\necho \"\"\necho \"1. 升级名称(中文):\"\ngrep -o '\"[^\"]*\"[^\"]*\"[^\"]*\"[^\"]*\"$' scripts/upgrades/upgrade_catalog.gd | head -10\necho \"\"\necho \"2. HUD主要文本:\"\ngrep -A1 'text =' scenes/hud.tscn | grep -v '^\\-\\-' | head -12\necho \"\"\necho \"3. 金币系统:\"\ngrep 'var gold' scripts/game_manager.gd\necho \"僵尸掉金币: $(grep -c 'add_gold' scripts/enemy.gd)处\"\necho \"\"\necho \"4. 背包格子:\"\necho \"解锁格数: $(grep -c 'unlocked_backpack_slots' scripts/game_manager.gd)\"\necho \"面板行数: $(wc -l < scripts/ui/backpack_panel.gd)\"\necho \"\"\necho \"5. 升级菜单:\"\ngrep 'text = \"等' scenes/level_up_menu.tscn)", "Bash(grep 'append' scripts/upgrades/upgrade_catalog.gd | sed 's/.*\"\\([^\"]*\\)\".*\"\\([^\"]*\\)\".*/\\1: \\2/' | head -10)", "Bash(echo \"=== 金币纹理 ===\"\ngrep 'gold_coin_texture' scripts/asset_db.gd\necho \"\"\necho \"=== 金币场景 ===\"\nls -la scenes/gold_coin.tscn scripts/gold_coin.gd\necho \"\"\necho \"=== 金币弹出特效 ===\"\ngrep 'gold_pop' scripts/effects_manager.gd\necho \"\"\necho \"=== 僵尸掉金币 ===\"\ngrep -A2 '_spawn_gold_coin' scripts/enemy.gd\necho \"\"\necho \"=== 僵尸不掉直接 add_gold ===\"\ngrep 'add_gold' scripts/enemy.gd)", "Bash(echo \"=== 僵尸死亡逻辑 ===\"\nsed -n '108,120p' scripts/enemy.gd\necho \"\"\necho \"=== 已无 _spawn_xp_orb ===\"\ngrep -c '_spawn_xp_orb' scripts/enemy.gd || echo \"0 (已移除)\")", "Bash(ls -la .reasonix/attachments/clipboard-20260615-022017.425156-000001.png 2>/dev/null && file .reasonix/attachments/clipboard-20260615-022017.425156-000001.png 2>/dev/null)", "Bash(echo \"=== EffectsManager 完整内容 ===\" && cat scripts/effects_manager.gd)", "Bash(echo \"=== backpack_slot.gd 修复 ===\" && sed -n '13,21p' scripts/ui/backpack_slot.gd\necho \"\"\necho \"=== backpack_panel.gd 信号连接修复 ===\" && sed -n '59,61p' scripts/ui/backpack_panel.gd)", "Bash(echo \"=== GameManager 波次相关 ===\" && grep -n 'wave\\|on_enemy' scripts/game_manager.gd | head -20 && echo \"\" && echo \"=== EnemySpawner 波次检查 ===\" && grep -n 'wave\\|GameManager\\.' scripts/enemy_spawner.gd && echo \"\" && echo \"=== HUD 波次信号 ===\" && grep -n 'wave\\|stage_' scripts/ui/hud.gd | head -10 && echo \"\" && echo \"=== Enemy 击杀调用 ===\" && grep 'on_enemy_killed' scripts/enemy.gd)", "Bash(echo \"=== HUD 波次面板节点 ===\" && grep -A1 'WavePanel\\|Wave.*VBox\\|Wave.*Bar\\|Wave.*Label' scenes/hud.tscn | grep '\\[node')", "Bash(echo \"=== enemy.gd 击退相关 ===\" && grep -n 'body_size\\|knockback\\|KNOCKBACK' scripts/enemy.gd && echo \"\" && echo \"=== enemy_spawner body_size ===\" && grep 'body_size' scripts/enemy_spawner.gd && echo \"\" && echo \"=== bullet.gd 击退 ===\" && grep 'KNOCKBACK\\|apply_knockback' scripts/bullet.gd && echo \"\" && echo \"=== player_stats body_size ===\" && grep 'body_size' scripts/player_stats.gd)", "Bash(grep -A5 'CHASE state' scripts/enemy.gd && echo \"---\" && grep -B1 -A3 'knockback.length' scripts/enemy.gd)", "Bash(grep -n 'life_timer\\|queue_free\\|magnet_delay\\|magnet_timer' scripts/gold_coin.gd)", "Bash(cd /e/workspaceai/shoot && git add -A && git status)"]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit)
# may only write under workspace_root (empty = current dir) + allow_write.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

# External MCP servers. type: "stdio" (default, a subprocess) | "http" | "sse".
# ${VAR} / ${VAR:-default} are expanded from the environment in command/args/env/url/headers.
