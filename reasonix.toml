# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/AppData/Roaming/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
# max_steps         = 0   # executor tool-call rounds; 0 = no limit
# planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature       = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# reasoning_language = "zh"   # visible reasoning language: auto|zh|en
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
cold_resume_prune   = true   # elide stale tool results when reopening a session past the provider cache window
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[[providers]]
name        = "deepseek-flash"
kind        = "openai"
base_url    = "https://api.deepseek.com"
model       = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"   # optional; wallet-balance endpoint shown in the status bar
context_window = 1000000   # tokens; compaction triggers near this limit
price       = { cache_hit = 0.0028, input = 0.14, output = 0.28, currency = "$" }   # provider-wide fallback, per 1M tokens
prices      = { "deepseek-v4-flash" = { cache_hit = 0.0028, input = 0.14, output = 0.28, currency = "$" } }   # per-model prices, per 1M tokens

[[providers]]
name        = "deepseek-pro"
kind        = "openai"
base_url    = "https://api.deepseek.com"
model       = "deepseek-v4-pro"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"   # optional; wallet-balance endpoint shown in the status bar
context_window = 1000000   # tokens; compaction triggers near this limit
price       = { cache_hit = 0.003625, input = 0.435, output = 0.87, currency = "$" }   # provider-wide fallback, per 1M tokens
prices      = { "deepseek-v4-pro" = { cache_hit = 0.003625, input = 0.435, output = 0.87, currency = "$" } }   # per-model prices, per 1M tokens

[[providers]]
name        = "mimo-pro"
kind        = "openai"
base_url    = "https://token-plan-cn.xiaomimimo.com/v1"
model       = "mimo-v2.5-pro"
api_key_env = "MIMO_API_KEY"
context_window = 1000000   # tokens; compaction triggers near this limit
price       = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" }   # provider-wide fallback, per 1M tokens
no_proxy    = true   # reach this base_url directly, never via the proxy

[[providers]]
name        = "mimo-flash"
kind        = "openai"
base_url    = "https://token-plan-cn.xiaomimimo.com/v1"
model       = "mimo-v2.5"
api_key_env = "MIMO_API_KEY"
context_window = 1000000   # tokens; compaction triggers near this limit
price       = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }   # provider-wide fallback, per 1M tokens
no_proxy    = true   # reach this base_url directly, never via the proxy

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix

[builtin_mcp]
time_enabled = true   # built-in Time MCP; off until manually enabled
context7_enabled = false   # built-in Context7 MCP; off until manually enabled

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "ask"
# deny = ["Bash(rm -rf*)", "Bash(git push*)"]   # hard-blocked in every mode
allow = ["Bash(git add -A && git status)", "Bash(git commit:*)", "Bash(cd /e/workspacedemo/shoot && git rm -r --cached .reasonix/ 2>/dev/null; git add -A && git commit --amend -m \"僵尸幸存者改造：主菜单+选关地图+左右射击+撕咬机制\" && git push --force)", "Bash(cd /e/workspacedemo/shoot && git add README.md && git commit -m \"添加 README.md 项目文档\" && git push)", "Bash(cd /e/workspacedemo/shoot && git push)", "Bash(cd /e/workspacedemo/shoot && git push --retry 3)", "Bash(ls -la assets/imgs/ 2>/dev/null || echo \"目录不存在\")", "Edit", "Bash(rm /e/workspacedemo/shoot/assets/imgs/map.png.import:*)", "Bash(python -c \"from PIL import Image; img=Image.open('/e/workspacedemo/shoot/assets/imgs/map.png'); print(img.size)\" 2>/dev/null || identify /e/workspacedemo/shoot/assets/imgs/map.png 2>/dev/null || echo \"no tool available\")", "Bash(cd /e/workspacedemo/shoot && git add -A && git commit -m \"地图滚动：MapContainer 跟随玩家移动，限制地图边缘\" && git push 2>&1 | head -20)", "Bash(cd /e/workspacedemo/shoot && git add -A && git status)", "Bash(cd /e/workspacedemo/shoot && git add -A && git commit -m \"背包系统：拾取/装备双按钮 + 背包面板UI\" && git push)", "Bash(cd /e/workspacedemo/shoot && for i in 1 2 3; do echo \"--- attempt $i ---\"; git push 2>&1 && break; sleep 2; done)", "Bash(cd /e/workspacedemo/shoot && git config --global http.version HTTP/1.1 && git push --force -u origin main 2>&1)", "Bash(cd /e/workspacedemo/shoot && git fetch origin 2>&1)", "Bash(cd /e/workspacedemo/shoot && git stash && git pull --rebase origin main && git stash pop 2>&1)", "Bash(cd /e/workspacedemo/shoot && git rm --cached .codegraph/daemon.pid 2>/dev/null; git reset HEAD 2>/dev/null; git status)", "Bash(cd /e/workspacedemo/shoot && git diff --stat)", "Bash(mkdir -p:*)", "Bash(mv /e/workspacedemo/shoot/scripts/config_data.gd /e/workspacedemo/shoot/config/config_data.gd 2>&1 || echo \"mv failed\")", "Bash(ls /e/workspacedemo/shoot/scripts/config_data.gd.uid 2>/dev/null && cat /e/workspacedemo/shoot/scripts/config_data.gd.uid 2>/dev/null || echo \"no uid file\")", "Bash(cd /e/workspacedemo/shoot && python -c \"\nimport os\n\nstages = {\n    1: 5, 2: 4, 3: 5, 4: 4, 5: 5,\n}\n\nstage_config = {\n    (1,1): ('survive',60), (1,2): ('kill_all',0), (1,3): ('survive',90),\n    (1,4): ('kill_all',0), (1,5): ('survive',120),\n    (2,1): ('survive',90), (2,2): ('kill_all',0), (2,3): ('survive',120),\n    (2,4): ('kill_all',0),\n    (3,1): ('survive',90), (3,2): ('kill_all',0), (3,3): ('survive',120),\n    (3,4): ('kill_all',0), (3,5): ('survive',150),\n    (4,1): ('survive',120), (4,2): ('kill_all',0), (4,3): ('survive',150),\n    (4,4): ('kill_all',0),\n    (5,1): ('survive',120), (5,2): ('kill_all',0), (5,3): ('survive',150),\n    (5,4): ('kill_all',0), (5,5): ('survive',180),\n}\n\nos.makedirs('config/stages', exist_ok=True)\n\nfname_map = {}\n\nfor ch in range(1, 6):\n    for st in range(1, stages[ch]+1):\n        mode, dur = stage_config[(ch,st)]\n        fname = 'config/stages/stage{:02d}_{:02d}.gd'.format(ch, st)\n        fname_map[(ch,st)] = fname\n        with open(fname, 'w') as f:\n            f.write('extends RefCounted\\n')\n            f.write('const mode = \\\"%s\\\"\\n' % mode)\n            if dur > 0:\n                f.write('const duration = %d\\n' % dur)\n\nprint('Created %d stage files' % len(fname_map))\nfor (ch,st),fn in sorted(fname_map.items()):\n    print('%s: mode=%s' % (fn, stage_config[(ch,st)][0]))\n\")", "Bash(cd /e/workspacedemo/shoot && python -c \"\nimport os\n\nstages = {1: 5, 2: 4, 3: 5, 4: 4, 5: 5}\n\nstage_config = {\n    (1,1): ('survive',60), (1,2): ('kill_all',0), (1,3): ('survive',90),\n    (1,4): ('kill_all',0), (1,5): ('survive',120),\n    (2,1): ('survive',90), (2,2): ('kill_all',0), (2,3): ('survive',120),\n    (2,4): ('kill_all',0),\n    (3,1): ('survive',90), (3,2): ('kill_all',0), (3,3): ('survive',120),\n    (3,4): ('kill_all',0), (3,5): ('survive',150),\n    (4,1): ('survive',120), (4,2): ('kill_all',0), (4,3): ('survive',150),\n    (4,4): ('kill_all',0),\n    (5,1): ('survive',120), (5,2): ('kill_all',0), (5,3): ('survive',150),\n    (5,4): ('kill_all',0), (5,5): ('survive',180),\n}\n\ntry:\n    os.mkdir('config/stages')\nexcept:\n    pass\n\nfor ch in range(1, 6):\n    for st in range(1, stages[ch]+1):\n        mode, dur = stage_config[(ch,st)]\n        fname = 'config/stages/stage%02d_%02d.gd' % (ch, st)\n        with open(fname, 'w') as f:\n            f.write('extends RefCounted\\n')\n            f.write('const mode = \\\"%s\\\"\\n' % mode)\n            if dur > 0:\n                f.write('const duration = %d\\n' % dur)\n        print('%s -> mode=%s duration=%d' % (fname, mode, dur))\n\")", "Bash(ls /e/workspacedemo/shoot/scripts/config_data.gd.uid /e/workspacedemo/shoot/config/config_data.gd.uid 2>/dev/null; echo \"---\"; cat /e/workspacedemo/shoot/config/config_data.gd 2>/dev/null | head -3)", "Bash(strings /e/workspacedemo/shoot/.reasonix/attachments/clipboard-20260617-145137.380499-000001.png 2>/dev/null | grep -i \"error\\|parse\\|expect\\|identifier\\|not declared\\|invalid\\|constant\" | head -20)", "Bash(python -c \"\n# Check the recent error image for text content\nimport struct\nwith open('/e/workspacedemo/shoot/.reasonix/attachments/clipboard-20260617-145137.380499-000001.png', 'rb') as f:\n    data = f.read()\n# Extract any readable strings\nresult = []\ncurrent = ''\nfor b in data:\n    if 32 <= b < 127:\n        current += chr(b)\n    else:\n        if len(current) > 4:\n            result.append(current)\n        current = ''\nif len(current) > 4:\n    result.append(current)\nfor r in result:\n    print(r)\n\" 2>/dev/null | grep -i \"error\\|parse\\|const\\|get\\|not\\|invalid\\|declared\" | head -20)", "Bash(python -c \"\ndata = open('/e/workspacedemo/shoot/.reasonix/attachments/clipboard-20260617-145137.380499-000001.png', 'rb').read()\ntext = ''\nfor b in data:\n    if 32 <= b < 127:\n        text += chr(b)\n    else:\n        if len(text) > 4:\n            for kw in ['error', 'parse', 'const', 'get', 'identifier', 'not declared', 'invalid']:\n                if kw in text.lower():\n                    print(text[:120])\n                    break\n        text = ''\n\")", "Bash(python -c \"\nimport os\n# Find the attachment file\nfor root, dirs, files in os.walk('/e/workspacedemo/shoot/.reasonix'):\n    for f in files:\n        if '.png' in f:\n            print(os.path.join(root, f))\n\")", "Bash(python -c \"\nimport os, re\n\nerrors = []\n\n# Check all .gd files in scripts/ and config/\nfor root, dirs, files in os.walk('/e/workspacedemo/shoot/scripts'):\n    for f in files:\n        if f.endswith('.gd'):\n            path = os.path.join(root, f)\n            with open(path) as fh:\n                content = fh.read()\n            # Check for 'func get(' which conflicts with Object.get()\n            for m in re.finditer(r'^\\s*func\\s+get\\s*\\(', content, re.MULTILINE):\n                errors.append('func get() in %s' % path)\n            # Check for const that calls functions\n            for m in re.finditer(r'^const\\s+\\w+\\s*:?\\s*=.*\\(', content, re.MULTILINE):\n                val = m.group()\n                if 'preload' not in val and len(val) < 100:\n                    errors.append('const with function call: %s in %s' % (val[:80], path))\n\nfor e in errors:\n    print(e)\nif not errors:\n    print('No obvious issues found')\n\")", "Bash(python -c \"\n# Try to extract text from the PNG\nimport struct\nwith open('/e/workspacedemo/shoot/.reasonix/attachments/clipboard-20260617-145137.380499-000001.png', 'rb') as f:\n    data = f.read()\n# Extract readable strings\ntext = ''\nfor b in data:\n    if 32 <= b < 127:\n        text += chr(b)\n    else:\n        if len(text) > 3:\n            print(text)\n        text = ''\n\")", "Bash(python -c \"\n# Check the error image content more carefully\nimport struct\nwith open('/e/workspacedemo/shoot/.reasonix/attachments/clipboard-20260617-145137.380499-000001.png', 'rb') as f:\n    data = f.read()\n# Check PNG header\nprint('PNG size:', len(data))\nprint('First 20 bytes:', data[:20])\n# Find all text-like sections\nin_text = False\nresult = []\ncurrent = ''\nfor b in data:\n    if 32 <= b < 127:\n        if not in_text:\n            in_text = True\n        current += chr(b)\n    else:\n        if in_text:\n            if len(current) > 5:\n                result.append(current)\n            current = ''\n            in_text = False\nif current and len(current) > 5:\n    result.append(current)\nprint('Found', len(result), 'text strings')\nfor r in result:\n    print(r[:200])\n\" 2>/dev/null | tail -30\")", "Bash(python -c \"\ntry:\n    f = open('.reasonix/attachments/clipboard-20260617-145137.380499-000001.png', 'rb')\n    data = f.read()\n    f.close()\n    print('File size:', len(data))\n    txt = ''\n    for b in data:\n        if 32 <= b < 127:\n            txt += chr(b)\n        else:\n            if len(txt) > 8:\n                print(txt[:150])\n            txt = ''\nexcept Exception as e:\n    print('Error:', e)\n\")", "Bash(python -c \"\nimport os\nfor root, dirs, files in os.walk('/e/workspacedemo/shoot'):\n    for f in files:\n        if 'config_data' in f:\n            print(os.path.join(root, f))\n        if 'enemys' in f and f.endswith('.gd'):\n            print(os.path.join(root, f))\n        if 'players' in f and f.endswith('.gd'):\n            print(os.path.join(root, f))\n\")", "Bash(python -c \"\nimport subprocess\n# Try to use tesseract if available\ntry:\n    import subprocess\n    result = subprocess.run(['tesseract', '.reasonix/attachments/clipboard-20260617-145137.380499-000001.png', '-'], capture_output=True, text=True, timeout=5)\n    print(result.stdout)\nexcept:\n    print('tesseract not available')\n\")", "Bash(python -c \"\nimport os, glob\n\nstages_dir = '/e/workspacedemo/shoot/config/stages'\nfor f in sorted(os.listdir(stages_dir)):\n    if f.endswith('.gd') and f.startswith('stage'):\n        path = os.path.join(stages_dir, f)\n        with open(path) as fh:\n            content = fh.read()\n        # Replace 'const ' with 'static var ' for non-array consts\n        # But keep 'extends RefCounted' as is\n        lines = content.split('\\n')\n        new_lines = []\n        for line in lines:\n            stripped = line.strip()\n            if stripped.startswith('const ') and '=' in stripped:\n                # Replace first 'const ' with 'static var '\n                indent = line[:len(line) - len(line.lstrip())]\n                new_lines.append(indent + 'static var ' + stripped[6:])\n            else:\n                new_lines.append(line)\n        new_content = '\\n'.join(new_lines)\n        with open(path, 'w') as fh:\n            fh.write(new_content)\n        print('Updated:', f)\n\")", "Bash(python -c \"\nfiles = ['stage01_02','stage01_03','stage01_04','stage01_05',\n         'stage02_01','stage02_02','stage02_03','stage02_04',\n         'stage03_01','stage03_02','stage03_03','stage03_04','stage03_05',\n         'stage04_01','stage04_02','stage04_03','stage04_04',\n         'stage05_01','stage05_02','stage05_03','stage05_04','stage05_05']\nfor f in files:\n    path = 'config/stages/' + f + '.gd'\n    try:\n        with open(path) as fh:\n            content = fh.read()\n        content = content.replace('const mode', 'static var mode')\n        content = content.replace('const duration', 'static var duration')\n        with open(path, 'w') as fh:\n            fh.write(content)\n        print('OK', f)\n    except Exception as e:\n        print('FAIL', f, e)\n\")", "Bash(python -c \"\nimport struct\nwith open('.reasonix/attachments/clipboard-20260617-165309.571668-000002.png', 'rb') as f:\n    data = f.read()\ntxt = ''\nfor b in data:\n    if 32 <= b < 127:\n        txt += chr(b)\n    else:\n        if len(txt) > 5:\n            if any(k in txt.lower() for k in ['error','invalid','can','not','null','nil']):\n                print(txt[:200])\n        txt = ''\n\")", "Bash(python -c \"\nwith open('.reasonix/attachments/clipboard-20260617-165309.571668-000002.png', 'rb') as f:\n    data = f.read()\n# Try to find any text chunks in PNG\nidx = data.find(b'tEXt')\nwhile idx != -1:\n    end = data.find(b'\\x00', idx)\n    if end != -1:\n        try:\n            print('Text:', data[idx+4:end].decode('latin-1'))\n        except:\n            pass\n    idx = data.find(b'tEXt', idx+1)\n# Also find IDAT chunks and check for text\nimport struct\n# Try reading IHDR\nif data.startswith(b'\\x89PNG'):\n    w = struct.unpack('>I', data[16:20])[0]\n    h = struct.unpack('>I', data[20:24])[0]\n    print('Image size: %dx%d' % (w, h))\n\")"]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit/move_file)
# may only write under workspace_root (empty = current dir) + allow_write.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

# External MCP servers. type: "stdio" (default, a subprocess) | "http" | "sse".
# ${VAR} / ${VAR:-default} are expanded from the environment in command/args/env/url/headers.
